<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/><line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="320" y1="0" x2="320" y2="300"/>
  </g>
  <!-- Alarm Panel (center) -->
  <rect x="130" y="45" width="140" height="190" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="140" y="55" width="120" height="40" rx="4" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <!-- LCD Screen text -->
  <text x="200" y="75" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="10" font-weight="bold">ARMED</text>
  <text x="200" y="88" text-anchor="middle" fill="#22d3ee" font-family="monospace" font-size="8" opacity="0.7">ZONE OK</text>
  <!-- Keypad buttons -->
  <g fill="#334155" stroke="#475569" stroke-width="0.5">
    <rect x="148" y="108" width="28" height="22" rx="3"/><rect x="186" y="108" width="28" height="22" rx="3"/><rect x="224" y="108" width="28" height="22" rx="3"/>
    <rect x="148" y="138" width="28" height="22" rx="3"/><rect x="186" y="138" width="28" height="22" rx="3"/><rect x="224" y="138" width="28" height="22" rx="3"/>
    <rect x="148" y="168" width="28" height="22" rx="3"/><rect x="186" y="168" width="28" height="22" rx="3"/><rect x="224" y="168" width="28" height="22" rx="3"/>
    <rect x="148" y="198" width="28" height="22" rx="3"/><rect x="186" y="198" width="28" height="22" rx="3"/><rect x="224" y="198" width="28" height="22" rx="3"/>
  </g>
  <!-- Keypad numbers -->
  <g fill="#94a3b8" font-family="Arial" font-size="11" text-anchor="middle" dominant-baseline="central">
    <text x="162" y="119">1</text><text x="200" y="119">2</text><text x="238" y="119">3</text>
    <text x="162" y="149">4</text><text x="200" y="149">5</text><text x="238" y="149">6</text>
    <text x="162" y="179">7</text><text x="200" y="179">8</text><text x="238" y="179">9</text>
    <text x="162" y="209">*</text><text x="200" y="209">0</text><text x="238" y="209">#</text>
  </g>
  <!-- Status LED -->
  <circle cx="200" cy="230" r="3" fill="#22c55e">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Siren (right side) -->
  <g transform="translate(310, 80)">
    <rect x="-20" y="0" width="40" height="60" rx="8" fill="url(#accent)"/>
    <rect x="-15" y="6" width="30" height="4" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="-15" y="14" width="30" height="4" rx="2" fill="#fff" opacity="0.25"/>
    <rect x="-15" y="22" width="30" height="4" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="-15" y="30" width="30" height="4" rx="2" fill="#fff" opacity="0.15"/>
    <rect x="-15" y="38" width="30" height="4" rx="2" fill="#fff" opacity="0.1"/>
    <!-- Sound waves -->
    <path d="M25 20 Q35 15, 35 30 Q35 45, 25 40" stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M30 15 Q45 10, 45 30 Q45 50, 30 45" stroke="#ef4444" stroke-width="1" fill="none" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.05;0.3" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Motion sensor (left side) -->
  <g transform="translate(70, 90)">
    <rect x="-18" y="0" width="36" height="50" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <circle cx="0" cy="18" r="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <circle cx="0" cy="18" r="4" fill="#dc2626" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <rect x="-10" y="34" width="20" height="3" rx="1.5" fill="#475569"/>
  </g>
  <!-- Glow effect bottom -->
  <ellipse cx="200" cy="280" rx="120" ry="15" fill="#dc2626" opacity="0.08"/>
</svg>