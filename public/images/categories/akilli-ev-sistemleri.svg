<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="hub-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/><line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="320" y1="0" x2="320" y2="300"/>
  </g>
  <!-- Smart Hub (center) -->
  <g transform="translate(200, 130)">
    <!-- Hub body - rounded square -->
    <rect x="-40" y="-40" width="80" height="80" rx="16" fill="url(#hub-grad)" stroke="#94a3b8" stroke-width="1"/>
    <!-- Hub center logo -->
    <circle cx="0" cy="0" r="18" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="0" cy="0" r="10" fill="#3b82f6" opacity="0.8">
      <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="4" fill="#fff" opacity="0.6"/>
  </g>
  <!-- Connection lines from hub to devices -->
  <g stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 4" opacity="0.3">
    <line x1="200" y1="90" x2="105" y2="55">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="90" x2="300" y2="55">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="170" x2="100" y2="220">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="170" x2="310" y2="215">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Door/Window Sensor (top-left) -->
  <g transform="translate(90, 35)">
    <rect x="-12" y="-15" width="24" height="40" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="16" y="-10" width="12" height="30" rx="3" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="#22c55e" opacity="0.7"/>
    <text x="0" y="32" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="8">Sensor</text>
  </g>
  <!-- Video Doorbell (top-right) -->
  <g transform="translate(300, 30)">
    <rect x="-16" y="-10" width="32" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <circle cx="0" cy="8" r="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <circle cx="0" cy="8" r="4" fill="#334155"/>
    <circle cx="0" cy="8" r="2" fill="#dc2626" opacity="0.6"/>
    <!-- Doorbell button -->
    <circle cx="0" cy="30" r="6" fill="#334155" stroke="#475569" stroke-width="1"/>
    <circle cx="0" cy="30" r="3" fill="#3b82f6" opacity="0.5"/>
    <text x="0" y="55" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="8">Doorbell</text>
  </g>
  <!-- Motion Detector (bottom-left) -->
  <g transform="translate(90, 210)">
    <rect x="-18" y="-10" width="36" height="45" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="0" cy="10" r="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <circle cx="0" cy="10" r="5" fill="#dc2626" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="45" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="8">PIR</text>
  </g>
  <!-- Smart Plug (bottom-right) -->
  <g transform="translate(310, 205)">
    <rect x="-18" y="-10" width="36" height="42" rx="6" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <circle cx="0" cy="10" r="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <!-- Power icon -->
    <path d="M0 2 L0 8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <path d="M-6 6 A8 8 0 1 0 6 6" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <text x="0" y="42" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="8">Plug</text>
  </g>
  <!-- WiFi waves around hub -->
  <g transform="translate(200, 130)" stroke="#3b82f6" fill="none" opacity="0.15">
    <circle cx="0" cy="0" r="55" stroke-width="1">
      <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="75" stroke-width="0.5">
      <animate attributeName="r" values="75;85;75" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.03;0.1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  <ellipse cx="200" cy="280" rx="120" ry="15" fill="#3b82f6" opacity="0.06"/>
</svg>