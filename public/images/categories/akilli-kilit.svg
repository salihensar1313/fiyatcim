<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="door" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="lock-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/><line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="320" y1="0" x2="320" y2="300"/>
  </g>
  <!-- Door panel -->
  <rect x="100" y="20" width="200" height="270" rx="4" fill="url(#door)" opacity="0.9"/>
  <rect x="105" y="25" width="190" height="260" rx="2" fill="none" stroke="#a16207" stroke-width="1" opacity="0.3"/>
  <!-- Door panel lines -->
  <line x1="110" y1="90" x2="290" y2="90" stroke="#a16207" stroke-width="0.5" opacity="0.2"/>
  <line x1="110" y1="200" x2="290" y2="200" stroke="#a16207" stroke-width="0.5" opacity="0.2"/>
  <!-- Smart Lock Body -->
  <g transform="translate(200, 140)">
    <!-- Lock housing -->
    <rect x="-35" y="-55" width="70" height="120" rx="10" fill="url(#lock-body)" stroke="#475569" stroke-width="1.5"/>
    <!-- Fingerprint scanner area -->
    <rect x="-22" y="-40" width="44" height="35" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <!-- Fingerprint icon -->
    <g transform="translate(0, -22)" stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.6">
      <path d="M-8 0 Q-8 -8, 0 -8 Q8 -8, 8 0"/>
      <path d="M-5 2 Q-5 -5, 0 -5 Q5 -5, 5 2"/>
      <path d="M-2 4 Q-2 -2, 0 -2 Q2 -2, 2 4"/>
      <line x1="0" y1="-1" x2="0" y2="6"/>
    </g>
    <!-- Status indicator -->
    <circle cx="0" cy="5" r="4" fill="#22c55e" opacity="0.8">
      <animate attributeName="fill" values="#22c55e;#3b82f6;#22c55e" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Keypad -->
    <g transform="translate(0, 25)">
      <rect x="-20" y="0" width="40" height="30" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
      <!-- Number dots -->
      <g fill="#475569">
        <circle cx="-10" cy="8" r="2.5"/><circle cx="0" cy="8" r="2.5"/><circle cx="10" cy="8" r="2.5"/>
        <circle cx="-10" cy="18" r="2.5"/><circle cx="0" cy="18" r="2.5"/><circle cx="10" cy="18" r="2.5"/>
      </g>
    </g>
    <!-- Handle -->
    <rect x="22" y="-10" width="18" height="45" rx="4" fill="#475569" stroke="#64748b" stroke-width="1"/>
    <rect x="25" y="0" width="12" height="20" rx="3" fill="#334155"/>
  </g>
  <!-- Lock icon (floating) -->
  <g transform="translate(320, 70)" opacity="0.15">
    <rect x="-12" y="0" width="24" height="20" rx="3" fill="#3b82f6"/>
    <path d="M-8 0 L-8 -8 A8 8 0 0 1 8 -8 L8 0" stroke="#3b82f6" stroke-width="3" fill="none"/>
    <circle cx="0" cy="10" r="3" fill="#1a1a2e"/>
  </g>
  <!-- Bluetooth / WiFi indicator -->
  <g transform="translate(80, 80)" opacity="0.2">
    <path d="M0 -15 L8 -7 L-8 1 L8 9 L0 17 L0 -15" stroke="#3b82f6" stroke-width="1.5" fill="none"/>
    <path d="M-12 -4 Q-4 -12, -4 -4" stroke="#3b82f6" stroke-width="1" fill="none"/>
    <path d="M-14 -8 Q-2 -18, -2 -4" stroke="#3b82f6" stroke-width="0.8" fill="none"/>
  </g>
  <ellipse cx="200" cy="285" rx="100" ry="10" fill="#92400e" opacity="0.1"/>
  <ellipse cx="200" cy="280" rx="120" ry="15" fill="#3b82f6" opacity="0.06"/>
</svg>