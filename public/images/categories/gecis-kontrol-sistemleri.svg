<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="device" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/><line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="320" y1="0" x2="320" y2="300"/>
  </g>
  <!-- Wall panel mount -->
  <rect x="90" y="30" width="130" height="240" rx="3" fill="#475569" opacity="0.3"/>
  <!-- Card Reader Device (main, center-left) -->
  <g transform="translate(155, 150)">
    <rect x="-45" y="-90" width="90" height="180" rx="10" fill="url(#device)" stroke="#475569" stroke-width="1.5"/>
    <!-- Screen area -->
    <rect x="-32" y="-75" width="64" height="40" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="-55" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="9" font-weight="bold">ACCESS</text>
    <text x="0" y="-43" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="7" opacity="0.7">GRANTED</text>
    <!-- Card tap area -->
    <rect x="-28" y="-25" width="56" height="50" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
    <!-- NFC/RFID waves -->
    <g transform="translate(0, 0)" stroke="#3b82f6" fill="none" opacity="0.4">
      <path d="M-10 -8 Q-10 8, 10 8 Q10 -8, -10 -8" stroke-width="1"/>
      <path d="M-15 -12 Q-15 12, 15 12 Q15 -12, -15 -12" stroke-width="0.8" opacity="0.6"/>
      <path d="M-20 -16 Q-20 16, 20 16 Q20 -16, -20 -16" stroke-width="0.5" opacity="0.3"/>
    </g>
    <!-- Keypad numbers -->
    <g transform="translate(0, 45)">
      <g fill="#475569">
        <rect x="-26" y="0" width="14" height="10" rx="2"/><rect x="-7" y="0" width="14" height="10" rx="2"/><rect x="12" y="0" width="14" height="10" rx="2"/>
        <rect x="-26" y="14" width="14" height="10" rx="2"/><rect x="-7" y="14" width="14" height="10" rx="2"/><rect x="12" y="14" width="14" height="10" rx="2"/>
        <rect x="-26" y="28" width="14" height="10" rx="2"/><rect x="-7" y="28" width="14" height="10" rx="2"/><rect x="12" y="28" width="14" height="10" rx="2"/>
      </g>
      <g fill="#64748b" font-family="Arial" font-size="7" text-anchor="middle" dominant-baseline="central">
        <text x="-19" y="5">1</text><text x="0" y="5">2</text><text x="19" y="5">3</text>
        <text x="-19" y="19">4</text><text x="0" y="19">5</text><text x="19" y="19">6</text>
        <text x="-19" y="33">7</text><text x="0" y="33">8</text><text x="19" y="33">9</text>
      </g>
    </g>
    <!-- Status LED -->
    <circle cx="-30" cy="-82" r="3" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Access Card (floating, right side) -->
  <g transform="translate(300, 100) rotate(-15)">
    <rect x="-40" y="-25" width="80" height="50" rx="5" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <!-- Card chip -->
    <rect x="-25" y="-10" width="18" height="14" rx="2" fill="#eab308" opacity="0.7"/>
    <line x1="-22" y1="-4" x2="-10" y2="-4" stroke="#ca8a04" stroke-width="0.5"/>
    <line x1="-22" y1="0" x2="-10" y2="0" stroke="#ca8a04" stroke-width="0.5"/>
    <!-- Card text -->
    <rect x="0" y="-8" width="30" height="3" rx="1" fill="#94a3b8" opacity="0.5"/>
    <rect x="0" y="0" width="20" height="2" rx="1" fill="#94a3b8" opacity="0.3"/>
    <rect x="-30" y="12" width="50" height="2" rx="1" fill="#94a3b8" opacity="0.2"/>
  </g>
  <!-- Fingerprint (bottom right) -->
  <g transform="translate(310, 220)" opacity="0.25">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#3b82f6" stroke-width="0.5"/>
    <g stroke="#3b82f6" stroke-width="0.8" fill="none">
      <path d="M-12 5 Q-12 -12, 0 -12 Q12 -12, 12 5"/>
      <path d="M-8 7 Q-8 -8, 0 -8 Q8 -8, 8 7"/>
      <path d="M-4 9 Q-4 -4, 0 -4 Q4 -4, 4 9"/>
      <line x1="0" y1="-2" x2="0" y2="12"/>
    </g>
  </g>
  <!-- Turnstile (bottom left, minimal) -->
  <g transform="translate(70, 230)" opacity="0.2">
    <rect x="-15" y="-30" width="8" height="60" rx="2" fill="#64748b"/>
    <rect x="7" y="-30" width="8" height="60" rx="2" fill="#64748b"/>
    <line x1="-11" y1="-20" x2="11" y2="-20" stroke="#64748b" stroke-width="2"/>
    <line x1="-11" y1="-5" x2="20" y2="-15" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
  </g>
  <ellipse cx="200" cy="280" rx="120" ry="15" fill="#3b82f6" opacity="0.06"/>
</svg>