<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="fire" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#bg)"/>
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/><line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/><line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/><line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/><line x1="320" y1="0" x2="320" y2="300"/>
  </g>
  <!-- Ceiling mount line -->
  <line x1="100" y1="25" x2="300" y2="25" stroke="#334155" stroke-width="2"/>
  <!-- Smoke Detector (center-top, ceiling mounted) -->
  <g transform="translate(200, 60)">
    <!-- Mount -->
    <rect x="-5" y="-35" width="10" height="12" rx="2" fill="#475569"/>
    <!-- Detector body -->
    <ellipse cx="0" cy="0" rx="45" ry="20" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <ellipse cx="0" cy="-2" rx="38" ry="15" fill="#f1f5f9"/>
    <!-- Vents -->
    <g stroke="#cbd5e1" stroke-width="1" opacity="0.6">
      <line x1="-20" y1="-4" x2="-20" y2="4"/><line x1="-14" y1="-6" x2="-14" y2="6"/>
      <line x1="-8" y1="-6" x2="-8" y2="6"/><line x1="-2" y1="-6" x2="-2" y2="6"/>
      <line x1="4" y1="-6" x2="4" y2="6"/><line x1="10" y1="-6" x2="10" y2="6"/>
      <line x1="16" y1="-6" x2="16" y2="6"/><line x1="22" y1="-4" x2="22" y2="4"/>
    </g>
    <!-- Center LED -->
    <circle cx="0" cy="0" r="4" fill="#dc2626" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Fire Alarm Panel (left) -->
  <g transform="translate(80, 130)">
    <rect x="-40" y="-30" width="80" height="130" rx="6" fill="#dc2626" stroke="#b91c1c" stroke-width="1.5"/>
    <!-- Panel label -->
    <rect x="-32" y="-22" width="64" height="18" rx="3" fill="#0f172a"/>
    <text x="0" y="-10" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="8" font-weight="bold">FIRE ALARM</text>
    <!-- Zone indicators -->
    <g transform="translate(0, 10)">
      <circle cx="-20" cy="0" r="4" fill="#22c55e"/><text x="-8" y="3" fill="#fef2f2" font-size="6">Z1</text>
      <circle cx="-20" cy="14" r="4" fill="#22c55e"/><text x="-8" y="17" fill="#fef2f2" font-size="6">Z2</text>
      <circle cx="-20" cy="28" r="4" fill="#eab308"/><text x="-8" y="31" fill="#fef2f2" font-size="6">Z3</text>
      <circle cx="-20" cy="42" r="4" fill="#dc2626">
        <animate attributeName="opacity" values="1;0.3;1" dur="0.8s" repeatCount="indefinite"/>
      </circle>
      <text x="-8" y="45" fill="#fef2f2" font-size="6">Z4</text>
    </g>
    <!-- Silence/Reset buttons -->
    <g transform="translate(0, 72)">
      <rect x="-28" y="0" width="24" height="12" rx="2" fill="#7f1d1d" stroke="#991b1b" stroke-width="0.5"/>
      <text x="-16" y="9" text-anchor="middle" fill="#fca5a5" font-size="5">RESET</text>
      <rect x="4" y="0" width="24" height="12" rx="2" fill="#7f1d1d" stroke="#991b1b" stroke-width="0.5"/>
      <text x="16" y="9" text-anchor="middle" fill="#fca5a5" font-size="5">MUTE</text>
    </g>
  </g>
  <!-- Fire Siren/Strobe (right) -->
  <g transform="translate(310, 100)">
    <rect x="-22" y="-22" width="44" height="44" rx="6" fill="#dc2626" stroke="#b91c1c" stroke-width="1.5"/>
    <!-- Strobe light -->
    <circle cx="0" cy="0" r="14" fill="#fef2f2" opacity="0.9"/>
    <circle cx="0" cy="0" r="10" fill="#fef3c7"/>
    <circle cx="0" cy="0" r="6" fill="#fbbf24">
      <animate attributeName="r" values="6;10;6" dur="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Light rays -->
    <g stroke="#eab308" stroke-width="1" opacity="0.3">
      <line x1="0" y1="-22" x2="0" y2="-35"/>
      <line x1="15" y1="-15" x2="25" y2="-25"/>
      <line x1="22" y1="0" x2="35" y2="0"/>
      <line x1="15" y1="15" x2="25" y2="25"/>
      <line x1="0" y1="22" x2="0" y2="35"/>
      <line x1="-15" y1="15" x2="-25" y2="25"/>
      <line x1="-22" y1="0" x2="-35" y2="0"/>
      <line x1="-15" y1="-15" x2="-25" y2="-25"/>
    </g>
  </g>
  <!-- Manual Call Point (bottom center) -->
  <g transform="translate(200, 210)">
    <rect x="-25" y="-25" width="50" height="50" rx="4" fill="#dc2626" stroke="#b91c1c" stroke-width="1.5"/>
    <rect x="-18" y="-18" width="36" height="36" rx="2" fill="none" stroke="#fef2f2" stroke-width="1" opacity="0.5"/>
    <!-- Glass break pattern -->
    <text x="0" y="-4" text-anchor="middle" fill="#fef2f2" font-family="Arial" font-size="7" font-weight="bold">BREAK</text>
    <text x="0" y="6" text-anchor="middle" fill="#fef2f2" font-family="Arial" font-size="7" font-weight="bold">GLASS</text>
    <!-- Down arrow -->
    <path d="M-6 14 L0 20 L6 14" stroke="#fef2f2" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Heat detector (right bottom) -->
  <g transform="translate(310, 200)" opacity="0.5">
    <circle cx="0" cy="0" r="18" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <circle cx="0" cy="0" r="10" fill="#0f172a"/>
    <!-- Thermometer icon -->
    <rect x="-2" y="-10" width="4" height="14" rx="2" fill="#ef4444" opacity="0.6"/>
    <circle cx="0" cy="6" r="4" fill="#ef4444" opacity="0.6"/>
  </g>
  <!-- Smoke wisps (decorative) -->
  <g opacity="0.08" fill="none" stroke="#94a3b8" stroke-width="1.5">
    <path d="M180 85 Q175 95, 180 105 Q185 115, 180 125">
      <animate attributeName="d" values="M180 85 Q175 95, 180 105 Q185 115, 180 125;M180 85 Q185 95, 180 105 Q175 115, 180 125;M180 85 Q175 95, 180 105 Q185 115, 180 125" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M220 85 Q215 95, 220 105 Q225 115, 220 125">
      <animate attributeName="d" values="M220 85 Q215 95, 220 105 Q225 115, 220 125;M220 85 Q225 95, 220 105 Q215 115, 220 125;M220 85 Q215 95, 220 105 Q225 115, 220 125" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>
  <ellipse cx="200" cy="280" rx="120" ry="15" fill="#dc2626" opacity="0.08"/>
</svg>